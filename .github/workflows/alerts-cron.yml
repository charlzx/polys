name: Alerts Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  trigger-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/alerts
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "CRON_URL is not set" >&2
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not set" >&2
            exit 1
          fi

          curl -sS --fail-with-body \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: github-actions-cron" \
            "$CRON_URL"
